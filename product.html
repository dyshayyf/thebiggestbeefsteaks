<script>
document.addEventListener("mousemove", (e) => {

    // bikin spark lebih sering (lebih banyak)
    if (Math.random() > 0.65) return;

    const spark = document.createElement("div");
    spark.classList.add("spark");

    const colors = ["#ffffff", "#ffd700", "#ffb347"];

    // posisi cursor
    const x = e.clientX;
    const y = e.clientY;

    spark.style.left = x + "px";
    spark.style.top = y + "px";

    // ukuran random
    spark.style.width = (Math.random() * 5 + 2) + "px";
    spark.style.height = spark.style.width;

    // warna random (MULTICOLOR)
    const color = colors[Math.floor(Math.random() * colors.length)];
    spark.style.background = color;
    spark.style.boxShadow = `0 0 6px ${color}, 0 0 12px ${color}`;

    // kadang jadi star ✦
    if (Math.random() > 0.8) {
        spark.innerHTML = "✦";
        spark.style.background = "transparent";
        spark.style.color = color;
        spark.style.display = "flex";
        spark.style.alignItems = "center";
        spark.style.justifyContent = "center";
    }

    // movement random
    const dx = (Math.random() - 0.5) * 30;
    const dy = (Math.random() - 0.5) * 30;

    spark.style.setProperty("--move", `translate(${dx}px, ${dy}px)`);

    document.body.appendChild(spark);

    setTimeout(() => {
        spark.remove();
    }, 500);

});

// ================= LANGUAGE =================
function setLanguage(language) {
  bhs = language;

  document.getElementById("languageSelect").style.display = "none";
  document.getElementById("quizContainer").style.display = "block";

  currentQuestion = 0;
  g = 0; r = 0; h = 0; s = 0;

  showQuestion();
}

// ================= SHOW QUESTION =================
function showQuestion() {
  let data = (bhs === "english") ? englishQuestions : indonesiaQuestions;
  let q = data[currentQuestion];

  document.getElementById("question").innerText = q.question;

  document.getElementById("answers").innerHTML = `
    <button onclick="answer('a')">a. ${q.answers[0]}</button>
    <button onclick="answer('b')">b. ${q.answers[1]}</button>
    <button onclick="answer('c')">c. ${q.answers[2]}</button>
    <button onclick="answer('d')">d. ${q.answers[3]}</button>
  `;
}

// ================= ANSWER =================
function answer(choice) {
  if (choice === "a") {
    g += 2;
    h += 1;
  }
  else if (choice === "b") {
    r += 2;
    s += 1;
  }
  else if (choice === "c") {
    h += 2;
    g += 1;
  }
  else if (choice === "d") {
    s += 2;
    r += 1;
  }

  currentQuestion++;

  let data = (bhs === "english") ? englishQuestions : indonesiaQuestions;

  if (currentQuestion < data.length) {
    showQuestion();
  } else {
    showResult();
  }
}

// ================= RESULT =================
function showResult() {
  let result = "";
  let logo = "";
  let title = "";

  if (g >= r && g >= h && g >= s) {
    result = "Gryffindor";
    logo = "img/gryffindor-logo.png";
  }
  else if (r >= g && r >= h && r >= s) {
    result = "Ravenclaw";
    logo = "img/ravenclaw-logo.png";
  }
  else if (h >= g && h >= r && h >= s) {
    result = "Hufflepuff";
    logo = "img/hufflepuff-logo.png";
  }
  else {
    result = "Slytherin";
    logo = "img/slytherin-logo.png";
  }

  if (bhs === "english") {
    title = "Your Hogwarts House is";
  } else if (bhs === "indonesia") {
    title = "Hogwarts House Kamu adalah";
  }

  document.getElementById("quizContainer").innerHTML = `
    <div class="result-box">
      <h1>${title}</h1>
      <img src="${logo}" class="house-logo">
      <h2 id="result">${result}</h2>
    </div>
  `;
}
