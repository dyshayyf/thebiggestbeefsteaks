     <div style="position: relative; width: 100%; height: 0; padding-top: 56.2500%;
 padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden;
 border-radius: 8px; will-change: transform;">

<a href="https:&#x2F;&#x2F;www.canva.com&#x2F;design&#x2F;DAHGX51Od54&#x2F;UTO-2_88Y_UVFGEFstXAGg&#x2F;view?utm_content=DAHGX51Od54&amp;utm_campaign=designshare&amp;utm_medium=embeds&amp;utm_source=link" target="_blank" rel="noopener">Blue and Gold Elegant Museum Art Gallery Presentation</a> oleh Elizabeth Loviena
    
    <script>
        function toggleMenu(){

        document.getElementById("navbar")
        .classList.toggle("active");

        document.querySelector(".menu-toggle")
        .classList.toggle("open");
        }

        document.addEventListener("mousemove", (e) => {

    // bikin spark lebih sering (lebih banyak)
    if (Math.random() > 0.65) return;

    const spark = document.createElement("div");
    spark.classList.add("spark");

    const colors = ["#ffffff", "#ffd700", "#ffb347"];

    // posisi cursor
    const x = e.clientX;
    const y = e.clientY;

    spark.style.left = x + "px";
    spark.style.top = y + "px";

    // ukuran random
    spark.style.width = (Math.random() * 5 + 2) + "px";
    spark.style.height = spark.style.width;

    // warna random (MULTICOLOR)
    const color = colors[Math.floor(Math.random() * colors.length)];
    spark.style.background = color;
    spark.style.boxShadow = `0 0 6px ${color}, 0 0 12px ${color}`;

    // kadang jadi star ✦
    if (Math.random() > 0.8) {
        spark.innerHTML = "✦";
        spark.style.background = "transparent";
        spark.style.color = color;
        spark.style.display = "flex";
        spark.style.alignItems = "center";
        spark.style.justifyContent = "center";
    }

    // movement random
    const dx = (Math.random() - 0.5) * 30;
    const dy = (Math.random() - 0.5) * 30;

    spark.style.setProperty("--move", `translate(${dx}px, ${dy}px)`);

    document.body.appendChild(spark);

    setTimeout(() => {
        spark.remove();
    }, 500);

});
    </script>
    </body>
