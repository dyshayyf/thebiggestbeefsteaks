<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hogwarts House Sorting</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.cdnfonts.com/css/harry-p" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&display=swap" rel="stylesheet">
</head>

<body>
    <audio id="bgmusic" autoplay loop hidden preload="auto">
        <source src="music/mainsong.mp3" type="audio/mpeg">
    </audio>

<script src="script.js"></script>
    <header>

        <div class="header-left">
            <img src="img/logo.png" class="mini-logo">
            <div class="mainname">
                Hogwarts House Sorting
            </div>
        </div>

        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <nav id="navbar">
            <a href="index.html">Home</a>
            <a href="design.html">About Us</a>
            <a href="designproduct.html">Design Product</a>
            <a href="product.html">Product</a>
        </nav>

    </header>

    <section class="hero">

        <div class="left">

            <h1>
                WELCOME <br>
                TO OUR <br>
                WEBSITE
            </h1>
        </div>

        <div class="center">
            <img src="img/house.png" alt="Hogwarts Logo">
        </div>
    </section>

    <section class="houses">
        <p>
            Discover yo6ur Hogwarts house from <br>
            the GOAT Harry Potter movie or series
        </p>
        <input type="radio" name="house" id="gryffindor" checked>
        <input type="radio" name="house" id="slytherin">
        <input type="radio" name="house" id="ravenclaw">
        <input type="radio" name="house" id="hufflepuff">
        <div class="house-content">

            <div class="house-logos">
                <label for="gryffindor">
                    <img src="img/gryffindor-logo.png" alt="Gryffindor">
                </label>
                <label for="slytherin">
                    <img src="img/slytherin-logo.png" alt="Slytherin">
                </label>
                <label for="ravenclaw">
                    <img src="img/ravenclaw-logo.png" alt="Ravenclaw">
                </label>
                <label for="hufflepuff">
                    <img src="img/hufflepuff-logo.png" alt="Hufflepuff">
                </label>
            </div>

            <!-- HOUSE CARDS -->

            <div class="house-cards">

                <img src="img/gryffindor-card.png"
                     class="gryffindor-card"
                     alt="Gryffindor Card">

                <img src="img/slytherin-card.png"
                     class="slytherin-card"
                     alt="Slytherin Card">

                <img src="img/ravenclaw-card.png"
                     class="ravenclaw-card"
                     alt="Ravenclaw Card">

                <img src="img/hufflepuff-card.png"
                     class="hufflepuff-card"
                     alt="Hufflepuff Card">
            </div>
        </div>
    </section>


    <script>
        function toggleMenu(){

        document.getElementById("navbar")
        .classList.toggle("active");

        document.querySelector(".menu-toggle")
        .classList.toggle("open");
        }
    </script>
</body>

</html>
