<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hogwarts House Sorting</title>
    <link rel="stylesheet" href="styles.css">

    <link href="https://fonts.cdnfonts.com/css/harry-p" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&display=swap" rel="stylesheet">
</head>

<body>

    <header>
        <div class="mainname">Hogwarts House Sorting</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="design.html">About Us</a>
            <a href="designproduct.html">Design Product</a>
            <a href="product.html">Product</a>
        </nav>
    </header>

    <section class="hero">
        <div class="left">
            <h1>WELCOME<br>TO OUR<br>WEBSITE</h1>
    </div>

    <div class="center">
        <img src="house.png" alt="Hogwarts Logo">
    </div>
  </section>


  <section class="houses">
    <p>Discover your Hogwarts house from <br> the GOAT Harry Potter movie or series</p>

    <input type="radio" name="house" id="gryffindor" checked>
    <input type="radio" name="house" id="slytherin">
    <input type="radio" name="house" id="ravenclaw">
    <input type="radio" name="house" id="hufflepuff">

    <div class="house-logos">
        <label for="gryffindor">
            <img src="gryffindor-logo.png" alt="Gryffindor">
        </label>
        <label for="slytherin">
            <img src="slytherin-logo.png" alt="Slytherin">
        </label>
        <label for="ravenclaw">
            <img src="ravenclaw-logo.png" alt="Ravenclaw">
        </label>
        <label for="hufflepuff">
            <img src="hufflepuff-logo.png" alt="Hufflepuff">
        </label>
    </div>
  </section>

</body>
</html>
